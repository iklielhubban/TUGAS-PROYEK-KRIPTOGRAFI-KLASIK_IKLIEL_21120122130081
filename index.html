<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tugas Proyek Kriptografi Klasik</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">

</head>
<body>

<nav class="navbar navbar-dark bg-dark shadow">
<div class="container-fluid">
<span class="navbar-brand mb-0 h1">

<i class="fa-solid fa-shield-halved"></i> M Ikliel Hubban - 21120122130081
</span>
</div>
</nav>

<div class="container py-5">
<div class="card shadow-lg border-0 p-4" data-aos="fade-up">

<h3 class="mb-4 text-center">Kalkulator Enkripsi-Deskripsi</h3>

<div class="mb-3">
<label class="form-label">Algoritma</label>
<select class="form-select" id="cipherType">
<option value="vigenere">Vigenere Cipher</option>
<option value="affine">Affine Cipher</option>
<option value="playfair">Playfair Cipher</option>
<option value="hill">Hill Cipher</option>
<option value="enigma">Enigma Cipher</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Input</label>
<textarea class="form-control" id="inputText" rows="3"></textarea>
</div>

<div class="mb-3">
<label class="form-label">Upload File</label>
<input type="file" class="form-control" id="fileInput">
</div>

<div class="mb-3">
<label class="form-label">Key</label>
<input type="text" class="form-control" id="key">
</div>

<div class="d-flex gap-2">
<button class="btn btn-primary w-100" onclick="encrypt()">
<i class="fa-solid fa-lock"></i> Enkripsi
</button>

<button class="btn btn-success w-100" onclick="decrypt()">
<i class="fa-solid fa-unlock"></i> Dekripsi
</button>

<button class="btn btn-dark w-100" onclick="downloadResult()">
<i class="fa-solid fa-download"></i> Download
</button>
</div>

<hr>

<div class="mt-3">
<label class="form-label">Output</label>
<textarea class="form-control" id="outputText" rows="3" readonly></textarea>
</div>

<div class="mt-4">
<h6>Log</h6>
<div id="logBox" class="log-box"></div>
</div>

</div>
</div>


<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();
</script>

<script src="script.js"></script>
</body>
</html>
